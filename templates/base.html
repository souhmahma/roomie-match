<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RoomieMatch{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-xl font-bold text-blue-600">🏠 RoomieMatch</a>
    <div class="flex items-center gap-4 text-sm">
      <a href="{% url 'listings:list' %}" class="text-gray-600 hover:text-blue-600">Listings</a>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}"  class="text-gray-600 hover:text-blue-600">Dashboard</a>
        <a href="{% url 'profile' %}"    class="text-gray-600 hover:text-blue-600">Profile</a>
        <a href="{% url 'logout' %}"     class="bg-red-500 text-white px-4 py-1 rounded-lg hover:bg-red-600">Logout</a>
      {% else %}
        <a href="{% url 'login' %}"      class="text-gray-600 hover:text-blue-600">Login</a>
        <a href="{% url 'register' %}"   class="bg-blue-600 text-white px-4 py-1 rounded-lg hover:bg-blue-700">Sign Up</a>
      {% endif %}
    </div>
  </nav>

  {% if messages %}
    <div class="max-w-4xl mx-auto px-4 mt-4">
      {% for message in messages %}
        <div class="p-3 rounded-lg mb-2 {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
