<div class="flex {% if message.sender == request.user %}justify-end{% else %}justify-start{% endif %}">
  <div class="max-w-xs lg:max-w-md px-4 py-2 rounded-2xl text-sm
    {% if message.sender == request.user %}
      bg-blue-600 text-white rounded-br-none
    {% else %}
      bg-gray-100 text-gray-800 rounded-bl-none
    {% endif %}">
    <p>{{ message.content }}</p>
    <p class="text-xs mt-1 opacity-60">{{ message.created_at|time:"H:i" }}</p>
  </div>
</div>
