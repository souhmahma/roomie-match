{% extends 'base.html' %}
{% block content %}
<div class="text-center py-20">
  <h1 class="text-5xl font-bold text-gray-800 mb-4">Find your perfect housing</h1>
  <p class="text-xl text-gray-500 mb-8">Matching based on your lifestyle</p>
  <div class="flex gap-4 justify-center">
    <a href="{% url 'listings:list' %}" class="bg-yellow-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">
      Browse listings
    </a>
    {% if not user.is_authenticated %}
    <a href="{% url 'register' %}" class="border-2 border-blue-600 text-blue-600 px-8 py-3 rounded-lg font-semibold hover:bg-blue-50">
      Create account
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
