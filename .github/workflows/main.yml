name: Django HTMX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  SECRET_KEY: "ci-mock-key"
  DATABASE_URL: "sqlite:///./db.sqlite3"
  REDIS_URL: "redis://localhost:6379/0"
  CELERY_TASK_ALWAYS_EAGER: "True"
  EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
  EMAIL_HOST: "localhost"
  EMAIL_PORT: "25"
  EMAIL_HOST_USER: "mock"
  EMAIL_HOST_PASSWORD: "mock"
  DEFAULT_FROM_EMAIL: "noreply@test.com"

  STRIPE_PUBLIC_KEY: "pk_test_mock"
  STRIPE_SECRET_KEY: "sk_test_mock"
  
jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker compose build

      - name: Start Container
        run: docker compose up -d

      - name: Smoke Test
        run: |
          sleep 10
          curl -I http://localhost:8000/ || (docker compose logs web && exit 1)
          echo "Django is up and running!"

      - name: Stop Container
        run: docker compose down

  deploy-ready:
    needs: build-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: echo "Build successful. Ready to deploy Django + HTMX app."
