name: Django HTMX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SECRET_KEY: "ci-insecure-mock-key-for-testing-only"
  DEBUG: "True"
  DATABASE_URL: "sqlite:///./db.sqlite3"
  ALLOWED_HOSTS: "127.0.0.1,localhost"
  REDIS_URL: "redis://:ton_password@ton-endpoint-redis-cloud:port"
  CELERY_TASK_ALWAYS_EAGER: "True"
  EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
  EMAIL_HOST: "localhost"
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "False"
  EMAIL_HOST_USER: "mock-user"
  EMAIL_HOST_PASSWORD: "mock-password"
  DEFAULT_FROM_EMAIL: "webmaster@localhost"

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy env file
        run: |
          mkdir -p backend
          touch backend/.env

      - name: Build Docker Image
        run: docker compose build

      - name: Start and Test
        run: |
          docker compose up -d
          sleep 15
          curl -f http://localhost:8000/ || (docker compose logs web && exit 1)
          docker compose down

  deploy-ready:
    needs: build-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: echo "Build successful."
